<!DOCTYPE html>

<body class="text-on-surface antialiased pb-32">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl shadow-sm dark:shadow-none">
<div class="flex flex-row-reverse justify-between items-center w-full px-6 py-4">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-secondary" data-icon="close">close</span>
<h1 class="text-xl font-black text-[#17252A] dark:text-white ml-2 brand-font">ثبت آگهی</h1>
</div>
<div class="text-[#2B7A78] font-bold font-['Plus_Jakarta_Sans'] text-right">
                انصراف
            </div>
</div>
<div class="bg-slate-100 dark:bg-slate-800 h-[1px] w-full"></div>
</header>
<main class="pt-24 px-6 max-w-2xl mx-auto">
<!-- Progress Indicator -->
<div class="mb-8 flex justify-between items-center text-sm font-medium text-outline">
<div class="flex items-center gap-2 text-primary">
<span class="w-8 h-8 rounded-full bg-primary text-white flex items-center justify-center">۱</span>
<span>اطلاعات آگهی</span>
</div>
<div class="h-[2px] flex-1 mx-4 bg-surface-container-highest rounded-full"></div>
<div class="flex items-center gap-2">
<span class="w-8 h-8 rounded-full bg-surface-container-high flex items-center justify-center">۲</span>
<span>تایید نهایی</span>
</div>
</div>
<form class="space-y-8">
<!-- Image Upload Section -->
<section>
<h2 class="text-lg font-bold mb-4 text-on-surface">تصاویر آگهی</h2>
<div class="grid grid-cols-3 gap-3">
<!-- Main Upload Trigger -->
<label class="aspect-square flex flex-col items-center justify-center rounded-lg border-2 border-dashed border-outline-variant bg-surface-container-low hover:bg-surface-container-high transition-colors cursor-pointer group">
<input class="hidden" multiple="" type="file"/>
<span class="material-symbols-outlined text-primary text-3xl mb-1 group-active:scale-90 transition-transform" data-icon="add_a_photo">add_a_photo</span>
<span class="text-[10px] text-outline font-medium">افزودن عکس</span>
</label>
<!-- Image Placeholders / Examples -->
<div class="aspect-square rounded-lg bg-surface-container-low overflow-hidden relative group">
<img alt="Placeholder" class="w-full h-full object-cover opacity-40 grayscale" data-alt="minimalist white product photography studio lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC9juFknxlYt-PXiRSsW9huoMMnhd2QBNGiL_LQm4mU2AIo8ooVVzaIMOwEweI_G58KSKQfl8c11YxovT-jw91OfLho08XLjG1YmaSLiNJgMKVA-yfmqZfTZzHeBKyeYR4_dmrc81MJ129nvYG74_f6iUwdTBOEhT1-IIDIBrOjAPZYNCg4ynNquzVyS7OoNAdudFSs1RgoqPekyIM30fRoeJSpmuzLJrrqi85KPvpBk0mMxc_ToQ-pl5RxHeDE8vAYUV0bYg8DS84"/>
<div class="absolute inset-0 flex items-center justify-center">
<span class="material-symbols-outlined text-outline-variant" data-icon="image">image</span>
</div>
</div>
<div class="aspect-square rounded-lg bg-surface-container-low overflow-hidden relative group">
<img alt="Placeholder" class="w-full h-full object-cover opacity-40 grayscale" data-alt="professional headphone product shot on clean background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCUTmkiDkgkXF9pAVKBuH9bX2TkvxAylCZLYSdkbhRMwtM1CjYO1BNsNLZcQU-R5cs84V0CC3iJXEze6CEvfhUV7AYrSJK-Z6aqHgFcEomJxeNQVpxVodQH13cbulkbsRQnr0bjjX-13O2dlNiDu2szgWXLCwFovkoGnoPReH1oHrUbUQuEKzway_5q-RyCg4i02OQ2lkceQXWibKNfieKgZC6q3ZOv-H166CbCkPa-ezM9NliU9oNxGy-uL024SKhf-yKc-VeDDhA"/>
<div class="absolute inset-0 flex items-center justify-center">
<span class="material-symbols-outlined text-outline-variant" data-icon="image">image</span>
</div>
</div>
</div>
<p class="mt-3 text-xs text-outline leading-relaxed">تعداد تصاویر نباید بیشتر از ۱۰ عدد باشد. عکس‌های واقعی بازدید آگهی را تا ۳ برابر افزایش می‌دهند.</p>
</section>
<!-- Form Fields -->
<div class="space-y-6">
<!-- Category Dropdown -->
<div class="space-y-2">
<label class="block text-sm font-semibold text-on-surface-variant pr-2">دسته‌بندی</label>
<div class="relative group">
<select class="w-full h-14 pr-12 pl-4 rounded-xl border-none bg-surface-container-low text-on-surface appearance-none focus:ring-2 focus:ring-primary/20 transition-all">
<option value="">انتخاب کنید...</option>
<option value="electronics">لوازم الکترونیک</option>
<option value="vehicles">وسایل نقلیه</option>
<option value="realestate">املاک</option>
<option value="home">لوازم خانه</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-primary" data-icon="grid_view">grid_view</span>
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline pointer-events-none" data-icon="expand_more">expand_more</span>
</div>
</div>
<!-- Title -->
<div class="space-y-2">
<label class="block text-sm font-semibold text-on-surface-variant pr-2">عنوان آگهی</label>
<div class="relative">
<input class="w-full h-14 pr-12 pl-4 rounded-xl border-none bg-surface-container-low text-on-surface focus:ring-2 focus:ring-primary/20 transition-all" placeholder="مثلاً: آیفون ۱۳ پرو در حد نو" type="text"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-primary" data-icon="title">title</span>
</div>
</div>
<!-- Description -->
<div class="space-y-2">
<label class="block text-sm font-semibold text-on-surface-variant pr-2">توضیحات</label>
<div class="relative">
<textarea class="w-full p-4 pr-12 rounded-xl border-none bg-surface-container-low text-on-surface focus:ring-2 focus:ring-primary/20 transition-all resize-none" placeholder="جزئیات و ویژگی‌های کالا یا خدمات خود را بنویسید..." rows="4"></textarea>
<span class="material-symbols-outlined absolute right-4 top-4 text-primary" data-icon="description">description</span>
</div>
</div>
<!-- Price and Phone Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div class="space-y-2">
<label class="block text-sm font-semibold text-on-surface-variant pr-2">قیمت (افغانی)</label>
<div class="relative">
<input class="w-full h-14 pr-12 pl-12 rounded-xl border-none bg-surface-container-low text-on-surface focus:ring-2 focus:ring-primary/20 transition-all font-mono" placeholder="۰" type="number"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-primary" data-icon="payments">payments</span>
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-xs font-bold text-outline">AFN</span>
</div>
</div>
<div class="space-y-2">
<label class="block text-sm font-semibold text-on-surface-variant pr-2">شماره موبایل</label>
<div class="relative">
<input class="w-full h-14 pr-12 pl-4 rounded-xl border-none bg-surface-container-low text-on-surface focus:ring-2 focus:ring-primary/20 transition-all text-left" dir="ltr" placeholder="۰۷XXXXXXXX" type="tel"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-primary" data-icon="phone_iphone">phone_iphone</span>
</div>
</div>
</div>
</div>
<!-- Toggles Section -->
<div class="space-y-4 pt-4">
<label class="flex items-center justify-between p-4 bg-surface-container-low rounded-xl cursor-pointer">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary" data-icon="chat">chat</span>
<span class="text-sm font-medium">امکان چت مستقیم فعال باشد</span>
</div>
<div class="relative inline-block w-12 h-6 rounded-full bg-primary-container/20">
<div class="absolute left-1 top-1 bg-white w-4 h-4 rounded-full transition-all translate-x-6 bg-primary"></div>
</div>
</label>
<label class="flex items-center justify-between p-4 bg-surface-container-low rounded-xl cursor-pointer">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary" data-icon="visibility_off">visibility_off</span>
<span class="text-sm font-medium">شماره موبایل مخفی بماند</span>
</div>
<div class="relative inline-block w-12 h-6 rounded-full bg-surface-container-high">
<div class="absolute left-1 top-1 bg-white w-4 h-4 rounded-full transition-all"></div>
</div>
</label>
</div>
</form>

<div class="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-xl px-6 py-6 z-40 border-t-0 shadow-[0_-8px_30px_rgb(0,0,0,0.04)]">
<div class="max-w-2xl mx-auto flex gap-4">
<button class="flex-1 h-14 bg-gradient-to-l from-primary to-primary-container text-white rounded-xl font-bold text-lg flex items-center justify-center gap-2 active:scale-95 transition-transform shadow-lg shadow-primary/20">
<span>ثبت و انتشار آگهی</span>
<span class="material-symbols-outlined" data-icon="rocket_launch">rocket_launch</span>
</button>
</div>
</div>
<!-- BottomNavBar (Filtered for this transactional page per instructions - Suppressing labels, showing minimal icons for context if needed, but per rule: suppress shell on task-focused pages. Adding a subtle back button instead) -->
<nav class="fixed bottom-0 w-full z-50 rounded-t-[2rem] bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl shadow-[0_-4px_20px_rgba(0,0,0,0.05)] md:hidden hidden">
<div class="flex flex-row-reverse justify-around items-center w-full px-2 pb-safe">
<div class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 p-2">
<span class="material-symbols-outlined" data-icon="home">home</span>
</div>
<div class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 p-2">
<span class="material-symbols-outlined" data-icon="grid_view">grid_view</span>
</div>
<div class="flex flex-col items-center justify-center bg-[#2B7A78] text-white rounded-full p-3 -mt-6 shadow-lg shadow-[#2B7A78]/30">
<span class="material-symbols-outlined" data-icon="add_circle" data-weight="fill" style="font-variation-settings: 'FILL' 1;">add_circle</span>
</div>
<div class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 p-2">
<span class="material-symbols-outlined" data-icon="chat">chat</span>
</div>
<div class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 p-2">
<span class="material-symbols-outlined" data-icon="person">person</span>
</div>
</div>
</nav>
</body></html>
