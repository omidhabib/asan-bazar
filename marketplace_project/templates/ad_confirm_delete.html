{% extends 'base.html' %}
{% block title %}Delete Ad - AfghaniStore{% endblock %}

{% block content %}
<div class="max-w-sm mx-auto mt-10">
    <div class="bg-white rounded-2xl shadow-sm p-6 text-center border-t-4 border-red-500">
        <div class="w-16 h-16 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-4">
            <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
        </div>
        <h2 class="text-xl font-bold text-gray-800 mb-2">Delete Ad?</h2>
        <p class="text-gray-500 text-sm mb-6">Are you sure you want to delete <span class="font-bold text-gray-700">"{{ object.title }}"</span>? This action cannot be undone.</p>

        <form method="POST">
            {% csrf_token %}
            <div class="space-y-3">
                <button type="submit" class="w-full bg-red-600 text-white font-bold py-3 rounded-xl hover:bg-red-700 active:scale-95 transition-all">
                    Yes, Delete Permanentely
                </button>
                <a href="{% url 'ad_detail' object.pk %}" class="block w-full text-center py-3 rounded-xl border border-gray-200 text-gray-600 font-semibold hover:bg-gray-50 transition">
                    No, Go Back
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
